version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      nextjs:
        patterns:
          - next
          - eslint-config-next
      testing:
        patterns:
          - vitest
          - '@vitest/*'
          - '@testing-library/*'
          - jsdom
          - '@vitejs/plugin-react'
      types:
        patterns:
          - '@types/*'
          - typescript

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
