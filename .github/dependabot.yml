version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: eslint
        versions: ['>=10.0.0']
      - dependency-name: typescript
        update-types: ['version-update:semver-major']
    groups:
      nextjs:
        patterns:
          - next
          - eslint-config-next
          - react
          - react-dom
          - eslint
      testing:
        patterns:
          - vitest
          - '@vitest/*'
          - '@testing-library/*'
          - jsdom
          - '@vitejs/plugin-react'
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
